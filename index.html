<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viva Coldplay Peak</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { 
            background-color: #0c1020; 
            color: white; 
            font-family: sans-serif; 
            text-align: center; 
            padding-top: 100px; 
            margin: 0;
        }
        h1 { color: #4285f4; }

        /* Estilos para el botón de Discord */
        .discord-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #5865F2; /* Color oficial Blurple de Discord */
            color: white;
            text-decoration: none; /* Le quita la línea fea de los links */
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px; /* Separación entre el logo y el texto */
            opacity: 0.85;
            transition: all 0.3s ease; /* Hace que el cambio de color sea suave */
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.2);
        }

        /* Lo que pasa cuando pasas el mouse por encima */
        .discord-btn:hover {
            opacity: 1;
            transform: translateY(-2px); /* Flota un poquito hacia arriba */
            box-shadow: 0 6px 20px rgba(88, 101, 242, 0.4);
        }
    </style>
</head>
<body>

    <a href="https://discord.gg/UhgKG9vH6K" target="_blank" class="discord-btn">
        <i class="fa-brands fa-discord"></i> Discord
    </a>

    <h1>Welcome to Viva Coldplay Peak</h1>
    <p>Sitio en construcción. ¡In My Place, In My Place...!</p>

</body>
</html>
